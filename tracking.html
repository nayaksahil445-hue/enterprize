<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Tracking | Jagannath Enterprises</title>
  <meta name="description" content="Track your order status at Jagannath Enterprises." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
  <style>
    .tracking-wrapper { max-width: 900px; margin: 0 auto; padding: 7rem 5% 4rem; min-height: 100vh; }
    .tracking-header h1 { font-family: var(--font-display); font-size: 3rem; letter-spacing: 2px; margin-bottom: 0.5rem; }
    .tracking-header p { color: var(--text-muted); margin-bottom: 2.5rem; }

    .tracking-card {
      background: var(--dark-3); border: 1px solid var(--border-subtle);
      border-radius: 16px; padding: 2.5rem; margin-bottom: 2rem;
    }

    .order-info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2.5rem; }
    .order-info-item { }
    .order-info-label { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); font-family: var(--font-head); font-weight: 700; margin-bottom: 0.3rem; }
    .order-info-value { font-weight: 700; font-size: 0.95rem; }
    .order-info-value.gold { color: var(--gold-light); }

    /* Timeline */
    .timeline { position: relative; padding: 0 0 0 3rem; }
    .timeline::before {
      content: ''; position: absolute; left: 14px; top: 0; bottom: 0;
      width: 2px; background: var(--dark-4);
    }
    .timeline-item { position: relative; padding-bottom: 2.5rem; }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-dot {
      position: absolute; left: -3rem; top: 2px;
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--dark-4); border: 2px solid var(--dark-4);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; z-index: 1; transition: all 0.3s;
    }
    .timeline-item.completed .timeline-dot {
      background: #22c55e; border-color: #22c55e;
      box-shadow: 0 0 12px rgba(34,197,94,0.4);
    }
    .timeline-item.current .timeline-dot {
      background: var(--gold); border-color: var(--gold);
      box-shadow: 0 0 12px rgba(201,162,39,0.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 12px rgba(201,162,39,0.4); } 50% { box-shadow: 0 0 22px rgba(201,162,39,0.6); } }

    .timeline-item.cancelled .timeline-dot { background: #ef4444; border-color: #ef4444; box-shadow: 0 0 12px rgba(239,68,68,0.4); }

    .timeline-status { font-weight: 700; font-size: 1rem; margin-bottom: 0.2rem; }
    .timeline-msg { color: var(--text-muted); font-size: 0.85rem; }
    .timeline-time { color: var(--text-dim); font-size: 0.75rem; margin-top: 0.3rem; }

    /* Order items */
    .order-items-list { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-subtle); }
    .order-item-row {
      display: flex; gap: 1rem; align-items: center; padding: 0.75rem 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .order-item-row:last-child { border: none; }
    .order-item-thumb {
      width: 50px; height: 50px; background: var(--dark-4); border-radius: 6px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .order-item-thumb img { width: 100%; height: 100%; object-fit: contain; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.35rem 0.8rem; border-radius: 20px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px;
    }
    .status-Placed { background: rgba(59,130,246,0.1); color: #3b82f6; }
    .status-Confirmed { background: rgba(99,102,241,0.1); color: #6366f1; }
    .status-Shipped { background: rgba(245,158,11,0.1); color: #f59e0b; }
    .status-OutForDelivery { background: rgba(249,115,22,0.1); color: #f97316; }
    .status-Delivered { background: rgba(34,197,94,0.1); color: #22c55e; }
    .status-Cancelled { background: rgba(239,68,68,0.1); color: #ef4444; }

    /* Review button */
    .review-btn {
      margin-top: 1.5rem; padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
      color: #000; border: none; border-radius: 8px; font-weight: 700;
      font-size: 0.82rem; letter-spacing: 1px; cursor: pointer;
      font-family: var(--font-head); transition: var(--transition);
    }
    .review-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,162,39,0.3); }

    /* Review form */
    .review-form {
      margin-top: 1.5rem; padding: 1.5rem; background: var(--dark-4);
      border: 1px solid var(--border-subtle); border-radius: 10px; display: none;
    }
    .review-form.visible { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .star-select { display: flex; gap: 0.3rem; margin-bottom: 1rem; }
    .star-select span {
      font-size: 1.8rem; cursor: pointer; color: var(--text-dim); transition: 0.2s;
    }
    .star-select span.filled { color: var(--gold); }
    .star-select span:hover { transform: scale(1.2); }

    @media(max-width:700px) {
      .order-info-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <nav id="navbar" class="scrolled">
    <a href="/" class="brand"><span class="brand-icon">⬛</span> Jagannath <em>Enterprises</em></a>
    <ul class="nav-links"><li><a href="/" class="nav-link">Home</a></li><li><a href="/dashboard.html" class="nav-link">My Orders</a></li></ul>
    <div class="nav-right"><button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button></div>
  </nav>

  <div class="tracking-wrapper">
    <div class="tracking-header">
      <h1>Order Tracking</h1>
      <p id="tracking-subtitle">Track your order status in real-time</p>
    </div>
    <div id="tracking-content">
      <div style="text-align:center;padding:4rem 2rem;">
        <div style="font-size:3rem;margin-bottom:1rem;animation:pulse 1.5s ease infinite;">📦</div>
        <p style="color:var(--text-muted);">Loading order details...</p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/tracking.js"></script>
</body>
</html>
