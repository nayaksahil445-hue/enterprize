<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard | Jagannath Enterprises</title>
  <meta name="description" content="Manage your orders, profile and wishlist at Jagannath Enterprises." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    .dash-wrapper { max-width: 1200px; margin: 0 auto; padding: 7rem 5% 4rem; min-height: 100vh; }
    .dash-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 3rem; }
    .dash-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 800; color: #000; font-family: var(--font-head);
      box-shadow: 0 4px 16px rgba(201,162,39,0.3);
    }
    .dash-header h1 { font-family: var(--font-display); font-size: 2.5rem; letter-spacing: 2px; }
    .dash-header p { color: var(--text-muted); font-size: 0.88rem; }

    /* Tabs */
    .dash-tabs { display: flex; gap: 0; margin-bottom: 2.5rem; overflow-x: auto; }
    .dash-tab {
      padding: 0.85rem 1.5rem; border: 1px solid var(--border-subtle);
      background: var(--dark-3); color: var(--text-muted); font-weight: 600;
      font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: var(--transition); font-family: var(--font-head);
      border-right: none; white-space: nowrap;
    }
    .dash-tab:first-child { border-radius: 8px 0 0 8px; }
    .dash-tab:last-child { border-radius: 0 8px 8px 0; border-right: 1px solid var(--border-subtle); }
    .dash-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
    .dash-tab:not(.active):hover { color: var(--gold); border-color: var(--gold); }

    .dash-pane { display: none; animation: fadeIn 0.3s ease; }
    .dash-pane.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Cards */
    .dash-card {
      background: var(--dark-3); border: 1px solid var(--border-subtle);
      border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;
      transition: var(--transition);
    }
    .dash-card:hover { border-color: var(--border); }

    /* Order card */
    .order-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .order-number { font-family: var(--font-head); font-weight: 700; color: var(--gold); font-size: 0.85rem; letter-spacing: 1px; }
    .order-date { color: var(--text-dim); font-size: 0.78rem; }

    .order-card-items { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .order-card-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.7rem; background: var(--dark-4);
      border-radius: 6px; font-size: 0.78rem;
    }
    .order-card-item img { width: 28px; height: 28px; object-fit: contain; }

    .order-card-footer { display: flex; justify-content: space-between; align-items: center; }
    .order-total { font-family: var(--font-display); font-size: 1.5rem; color: var(--gold-light); }

    .status-pill {
      padding: 0.35rem 0.85rem; border-radius: 20px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px;
    }
    .pill-Placed { background: rgba(59,130,246,0.1); color: #3b82f6; }
    .pill-Confirmed { background: rgba(99,102,241,0.1); color: #6366f1; }
    .pill-Shipped { background: rgba(245,158,11,0.1); color: #f59e0b; }
    .pill-OutForDelivery { background: rgba(249,115,22,0.1); color: #f97316; }
    .pill-Delivered { background: rgba(34,197,94,0.1); color: #22c55e; }
    .pill-Cancelled { background: rgba(239,68,68,0.1); color: #ef4444; }

    .track-btn {
      padding: 0.5rem 1rem; background: none; border: 1px solid var(--border);
      color: var(--gold); font-size: 0.72rem; font-weight: 600;
      letter-spacing: 1px; cursor: pointer; border-radius: 6px;
      transition: var(--transition); font-family: var(--font-head);
      text-decoration: none; text-transform: uppercase;
    }
    .track-btn:hover { background: rgba(201,162,39,0.08); }

    /* Profile form */
    .profile-form { display: flex; flex-direction: column; gap: 1.2rem; max-width: 500px; }
    .pf-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .pf-group label { font-size: 0.7rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); font-family: var(--font-head); }
    .pf-group input {
      padding: 0.8rem 1rem; background: var(--dark-4); border: 1px solid var(--border-subtle);
      color: var(--text); border-radius: 8px; font-size: 0.88rem; outline: none; transition: var(--transition);
    }
    .pf-group input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,162,39,0.1); }

    /* Wishlist grid */
    .wishlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }

    /* Address card */
    .address-card {
      background: var(--dark-4); border: 1px solid var(--border-subtle);
      border-radius: 8px; padding: 1.25rem; position: relative;
    }
    .address-card.default { border-color: var(--gold); }
    .address-default-badge {
      position: absolute; top: 0.75rem; right: 0.75rem;
      background: var(--gold); color: #000; font-size: 0.6rem; font-weight: 700;
      padding: 0.2rem 0.5rem; border-radius: 4px; letter-spacing: 1px; font-family: var(--font-head);
    }

    .empty-state { text-align: center; padding: 4rem 2rem; }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

    @media(max-width:700px) {
      .dash-header h1 { font-size: 1.8rem; }
      .dash-tabs { gap: 0; }
    }
  </style>
  <script type="module" crossorigin src="/assets/dashboard-DSlTJ98w.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/utils-CR0nv3qr.js">
  <link rel="stylesheet" crossorigin href="/assets/style-DxPQ0p4k.css">
</head>
<body>
  <nav id="navbar" class="scrolled">
    <a href="/" class="brand"><span class="brand-icon">⬛</span> Jagannath <em>Enterprises</em></a>
    <ul class="nav-links"><li><a href="/" class="nav-link">Home</a></li><li><a href="/#products" class="nav-link">Products</a></li></ul>
    <div class="nav-right">
      <button class="cart-trigger" id="cart-trigger" aria-label="Cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span id="cart-count" class="cart-badge">0</span>
      </button>
      <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="dash-wrapper">
    <div class="dash-header">
      <div class="dash-avatar" id="dash-avatar">U</div>
      <div>
        <h1 id="dash-name">My Dashboard</h1>
        <p id="dash-email">Loading...</p>
      </div>
    </div>

    <div class="dash-tabs">
      <button class="dash-tab active" data-pane="orders">📦 Orders</button>
      <button class="dash-tab" data-pane="profile">👤 Profile</button>
      <button class="dash-tab" data-pane="addresses">📍 Addresses</button>
      <button class="dash-tab" data-pane="wishlist">❤️ Wishlist</button>
    </div>

    <div class="dash-pane active" id="pane-orders"><div id="orders-content"><p style="color:var(--text-muted);">Loading orders...</p></div></div>
    <div class="dash-pane" id="pane-profile"><div id="profile-content"></div></div>
    <div class="dash-pane" id="pane-addresses"><div id="addresses-content"></div></div>
    <div class="dash-pane" id="pane-wishlist"><div id="wishlist-content"></div></div>
  </div>

</body>
</html>
